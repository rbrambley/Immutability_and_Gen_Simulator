<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Veeam Object-Storage Immutability + GEN Simulator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #f5f5f5;
        }
        textarea {
            width: 100%;
            height: 200px;
            font-family: monospace;
            padding: 10px;
        }
        #output {
            white-space: pre-wrap;
            background: #fff;
            padding: 15px;
            border: 1px solid #ccc;
            margin-top: 20px;
        }
        #debugLog {
            display: none;
            background: #111;
            color: #0f0;
            padding: 10px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #444;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<h1>Veeam Object-Storage Immutability + GEN Simulator</h1>

<h3>Paste Calculator Output</h3>
<textarea id="inputText" placeholder="Paste Veeam Calculator Output here..."></textarea>

<br><br>
<button id="runBtn">Run Simulation</button>
<button id="toggleDebug">Enable Debug Mode</button>

<div id="output"></div>

<pre id="debugLog"></pre>

<script>
let DEBUG_ENABLED = false;

document.getElementById("toggleDebug").onclick = () => {
    DEBUG_ENABLED = !DEBUG_ENABLED;
    document.getElementById("debugLog").style.display = DEBUG_ENABLED ? "block" : "none";
    document.getElementById("toggleDebug").textContent = DEBUG_ENABLED ? "Disable Debug Mode" : "Enable Debug Mode";
};

function debugLog(...args) {
    if (!DEBUG_ENABLED) return;
    const el = document.getElementById("debugLog");
    el.textContent += args.join(" ") + "\n";
}
</script>

<script src="parser.js"></script>
<script src="simulator.js"></script>

<script>
document.getElementById("runBtn").onclick = () => {
    const text = document.getElementById("inputText").value;
    debugLog("=== NEW RUN ===");
    debugLog("RAW INPUT:", text);

    const result = parseCalculatorInput(text);

    if (!result.ok) {
        debugLog("PARSER ERROR:", result.error);
        document.getElementById("output").textContent = "Input error:\n" + result.error;
        return;
    }

    debugLog("FINAL CONFIG:", JSON.stringify(result.config, null, 2));

    const simOutput = runSimulation(result.config);
    document.getElementById("output").textContent = simOutput;
};
</script>

</body>
</html>
