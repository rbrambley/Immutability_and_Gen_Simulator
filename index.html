<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Veeam Object-Storage Immutability + GEN Simulator</title>
    <style>
        body {
            font-family: Consolas, monospace;
            margin: 20px;
            background: #f7f7f7;
        }
        h1 { margin-bottom: 5px; }
        .section { margin-bottom: 20px; }
        textarea, input {
            width: 100%;
            font-family: Consolas, monospace;
        }
        #output {
            white-space: pre;
            background: #fff;
            padding: 15px;
            border: 1px solid #ccc;
            overflow-x: auto;
        }

        /* Debug Panel (Right Side) */
        #debugLog {
            position: fixed;
            top: 50px;
            right: 0;
            width: 350px;
            height: calc(100% - 60px);
            background: #111;
            color: #0f0;
            padding: 10px;
            border-left: 2px solid #444;
            overflow-y: auto;
            white-space: pre-wrap;
            display: none;
            z-index: 9999;
        }

        /* Debug Toggle Button */
        #toggleDebug {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 10000;
            padding: 6px 12px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            cursor: pointer;
        }

        /* Calculator synthetic interval field */
        #calcSyntheticWrapper {
            margin-top: 10px;
            width: 300px;
        }
        #calcSyntheticWrapper label {
            display: block;
            margin-bottom: 4px;
        }
        #calcSyntheticInterval {
            width: 100%;
        }
    </style>
</head>

<body>

<h1>Veeam Object-Storage Immutability + GEN Simulator</h1>

<div class="section">
    <label><input type="radio" name="mode" value="manual" checked> Manual Input</label>
    <label><input type="radio" name="mode" value="calculator"> Paste Calculator Output</label>
</div>

<!-- MANUAL INPUT FORM -->
<div id="manualForm" class="section">
    <h3>Manual Values</h3>

    <label>Initial Logical Size (GB)</label>
    <input id="initialSize" type="number">

    <label>Daily Change Rate (%)</label>
    <input id="dailyChange" type="number">

    <label>Annual Growth Rate (%)</label>
    <input id="annualGrowth" type="number">

    <label>Synthetic Full Interval (days)</label>
    <input id="syntheticInterval" type="number">

    <label>Minimum Immutability (days)</label>
    <input id="immutability" type="number">

    <label>Block Generation Window (days)</label>
    <input id="blockGen" type="number">

    <label>Job Retention (restore points)</label>
    <input id="retention" type="number">

    <label>Simulation Length (days)</label>
    <input id="simDays" type="number" value="365">
</div>

<!-- CALCULATOR PASTE -->
<div id="calcForm" class="section" style="display:none;">
    <h3>Paste Veeam Calculator Output</h3>
    <textarea id="calcInput" rows="12"></textarea>

    <!-- NEW FIELD: Synthetic Interval for Calculator Mode -->
    <div id="calcSyntheticWrapper">
        <label for="calcSyntheticInterval">Synthetic Full Interval (days)</label>
        <input id="calcSyntheticInterval" type="number" value="7">
    </div>
</div>

<button onclick="runSimulation()">Run Simulation</button>

<!-- Debug Toggle Button -->
<button id="toggleDebug">Enable Debug</button>

<h2>Output</h2>
<pre id="output">(results will appear here)</pre>

<!-- Debug Panel -->
<pre id="debugLog"></pre>

<script src="parser.js"></script>
<script src="simulator.js"></script>

<script>
/* Debug Panel Logic */
let DEBUG_ENABLED = false;

document.getElementById("toggleDebug").onclick = () => {
    DEBUG_ENABLED = !DEBUG_ENABLED;
    document.getElementById("debugLog").style.display = DEBUG_ENABLED ? "block" : "none";
    document.getElementById("toggleDebug").textContent =
        DEBUG_ENABLED ? "Disable Debug" : "Enable Debug";
};

function debugLog(...args) {
    if (!DEBUG_ENABLED) return;
    const el = document.getElementById("debugLog");
    el.textContent += args.join(" ") + "\n";
}

/* Mode Toggle Logic */
document.querySelectorAll("input[name='mode']").forEach(r => {
    r.addEventListener("change", () => {
        const manual = document.querySelector("input[name='mode'][value='manual']").checked;
        document.getElementById("manualForm").style.display = manual ? "block" : "none";
        document.getElementById("calcForm").style.display = manual ? "none" : "block";
    });
});

/* Run Simulation */
function runSimulation() {
    const mode = document.querySelector("input[name='mode']:checked").value;

    let config;
    if (mode === "manual") {
        config = parseManualInput();
    } else {
        const text = document.getElementById("calcInput").value;
        debugLog("=== NEW RUN ===");
        debugLog("RAW INPUT:", text);

        config = parseCalculatorInput(text);

        // Inject synthetic interval from calculator field
        const calcInterval = parseInt(document.getElementById("calcSyntheticInterval").value);
        if (!isNaN(calcInterval) && calcInterval > 0) {
            config.syntheticInterval = calcInterval;
            debugLog("Injected syntheticInterval from calculator field:", calcInterval);
        }
    }

    if (!config.valid) {
        debugLog("PARSER ERROR:", config.error);
        document.getElementById("output").textContent = "Input error:\n" + config.error;
        return;
    }

    const result = runSimulator(config);
    document.getElementById("output").textContent = result;
}
</script>

</body>
</html>
