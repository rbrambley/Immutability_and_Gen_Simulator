<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Veeam Object-Storage Immutability + GEN Simulator</title>
    <style>
        body {
            font-family: Consolas, monospace;
            margin: 20px;
            background: #f7f7f7;
        }
        h1 { margin-bottom: 5px; }
        .section { margin-bottom: 20px; }
        textarea, input {
            width: 100%;
            font-family: Consolas, monospace;
        }
        #output {
            white-space: pre;
            background: #fff;
            padding: 15px;
            border: 1px solid #ccc;
            overflow-x: auto;
        }
    </style>
</head>

<body>

<h1>Veeam Object-Storage Immutability + GEN Simulator</h1>

<div class="section">
    <label><input type="radio" name="mode" value="manual" checked> Manual Input</label>
    <label><input type="radio" name="mode" value="calculator"> Paste Calculator Output</label>
</div>

<!-- MANUAL INPUT FORM -->
<div id="manualForm" class="section">
    <h3>Manual Values</h3>

    <label>Initial Logical Size (GB)</label>
    <input id="initialSize" type="number">

    <label>Daily Change Rate (%)</label>
    <input id="dailyChange" type="number">

    <label>Annual Growth Rate (%)</label>
    <input id="annualGrowth" type="number">

    <label>Synthetic Full Interval (days)</label>
    <input id="syntheticInterval" type="number">

    <label>Minimum Immutability (days)</label>
    <input id="immutability" type="number">

    <label>Block Generation Window (days)</label>
    <input id="blockGen" type="number">

    <label>Job Retention (restore points)</label>
    <input id="retention" type="number">

    <label>Simulation Length (days)</label>
    <input id="simDays" type="number" value="365">
</div>

<!-- CALCULATOR PASTE -->
<div id="calcForm" class="section" style="display:none;">
    <h3>Paste Veeam Calculator Output</h3>
    <textarea id="calcInput" rows="12"></textarea>
</div>

<button onclick="runSimulation()">Run Simulation</button>

<h2>Output</h2>
<pre id="output">(results will appear here)</pre>

<script src="parser.js"></script>
<script src="simulator.js"></script>

<script>
document.querySelectorAll("input[name='mode']").forEach(r => {
    r.addEventListener("change", () => {
        const manual = document.querySelector("input[name='mode'][value='manual']").checked;
        document.getElementById("manualForm").style.display = manual ? "block" : "none";
        document.getElementById("calcForm").style.display = manual ? "none" : "block";
    });
});

function runSimulation() {
    const mode = document.querySelector("input[name='mode']:checked").value;

    let config;
    if (mode === "manual") {
        config = parseManualInput();
    } else {
        config = parseCalculatorInput(document.getElementById("calcInput").value);
    }

    if (!config.valid) {
        document.getElementById("output").textContent = "Input error:\n" + config.error;
        return;
    }

    const result = runSimulator(config);
    document.getElementById("output").textContent = result;
}
</script>

</body>
</html>
